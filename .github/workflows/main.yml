name: Weekly PR from preview to main

on:
  schedule:
    - cron: '30 20 * * 1' 
  workflow_dispatch: # Allows manual test

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Pull Request
        id: cpr
        run: |
          # Check if a PR already exists to avoid errors
          existing_pr=$(gh pr list --base main --head preview --json number --jq '.[0].number')
          
          if [ -z "$existing_pr" ]; then
            gh pr create \
              --base main \
              --head preview \
              --title "Weekly Sync: preview → main" \
              --body "This is an automated weekly pull request created on $(date +'%Y-%m-%d')."
          else
            echo "PR already exists: #$existing_pr. Skipping creation."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
